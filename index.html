<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover"
    />
    <meta property="og:title" content="길필선 ❤️ 김소미 결혼식에 초대합니다" />
    <meta property="og:description" content="저희의 소중한 날에 함께해주세요" />
    <meta property="og:image" content="https://kimsomi2020.github.io/invitation/images/final-note.jpg" />
    <meta property="og:url" content="https://kimsomi2020.github.io/invitation/" />
    <meta property="og:type" content="website" />
    <title>모바일 청첩장</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bottom-control" id="bottom-control">
      <button type="button" class="bottom-control__btn" id="btn-font-zoom" aria-pressed="false">가+ 큰 글씨</button>
      <button
        type="button"
        class="bottom-control__btn bottom-control__btn--icon music-toggle"
        id="music-toggle"
        aria-pressed="false"
        aria-label="배경음 켜기"
        title="배경음"
        hidden
      >
        <span class="music-toggle__icon music-toggle__icon--off" aria-hidden="true">🔇</span>
        <span class="music-toggle__icon music-toggle__icon--on" aria-hidden="true">🔊</span>
      </button>
    </div>

    <audio id="bgm-audio" preload="metadata" loop></audio>

    <div class="app-shell" id="app-shell">
      <main class="invite" id="top">
        <section class="hero" id="hero" aria-label="메인">
          <div class="hero__media">
            <img class="hero__img" src="" alt="" width="1200" height="1600" />
            <div class="hero__overlay"></div>
          </div>
          <p class="hero__float-title" id="hero-title"></p>
          <div class="hero__content">
            <p class="hero__subtitle" id="hero-subtitle"></p>
            <p class="hero__venue" id="hero-venue"></p>
          </div>
          <div class="hero__actions">
            <button type="button" class="btn btn--glass" id="btn-to-location">오시는 길</button>
          </div>
        </section>

        <section class="section section--cream" id="greeting">
          <div class="section__inner greeting" id="greeting-content"></div>
          <div class="section-divider section-divider--greeting" aria-hidden="true"></div>
          <div class="names-block" id="names-block"></div>
          <div class="names-block__action">
            <button type="button" class="btn-solid" id="btn-family-contact" aria-haspopup="dialog">연락하기</button>
          </div>
        </section>

        <section class="section section--cream" id="wedding-day">
          <h2 class="section__title section__title--serif" id="wedding-day-title">Wedding Day</h2>
          <p class="wedding-month-badge" id="wedding-month-label">7월</p>
          <div class="countdown" id="countdown" aria-live="polite">
            <p class="countdown__label">결혼식까지</p>
            <div class="countdown__digits">
              <span class="countdown__block"><strong id="cd-days">0</strong><small>일</small></span>
              <span class="countdown__sep">:</span>
              <span class="countdown__block"><strong id="cd-hours">0</strong><small>시</small></span>
              <span class="countdown__sep">:</span>
              <span class="countdown__block"><strong id="cd-mins">0</strong><small>분</small></span>
              <span class="countdown__sep">:</span>
              <span class="countdown__block"><strong id="cd-secs">0</strong><small>초</small></span>
            </div>
            <p class="countdown__done" id="countdown-done" hidden>D-day!</p>
          </div>
          <div class="calendar-wrap" id="calendar-root"></div>
          <div class="wedding-day__meta" id="wedding-day-meta"></div>
          <div class="quick-actions" id="quick-actions" aria-label="빠른 기능"></div>
        </section>
        <div class="section-divider" aria-hidden="true"></div>

        <section class="section" id="gallery">
          <h2 class="section__title section__title--gallery">GALLERY</h2>
          <div class="gallery-grid" id="gallery-grid"></div>
        </section>
        <div class="section-divider" aria-hidden="true"></div>

        <section class="section section--cream" id="location">
          <h2 class="section__title" id="location-title">오시는 길</h2>
          <p class="location__venue" id="location-venue"></p>
          <p class="location__address" id="location-address"></p>
          <div class="map-frame map-frame--with-pin">
            <iframe
              id="map-iframe"
              title="지도"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              allowfullscreen
            ></iframe>
            <div class="map-couple-pin" aria-hidden="true" title="예식장 위치">
              <div class="map-couple-pin__marker">
                <img src="./images/pin.png" alt="" class="map-couple-pin__svg" width="72" height="96" />
              </div>
            </div>
          </div>
          <div class="direction-list" id="direction-list"></div>
          <div class="nav-apps" id="nav-apps" aria-label="길찾기 앱"></div>
        </section>
        <div class="section-divider" aria-hidden="true"></div>

        <section class="section section--cream" id="gift">
          <h2 class="section__title" id="accounts-title">마음 전하실 곳</h2>
          <div class="accordion" id="accounts-accordion"></div>
        </section>
        <div class="section-divider" aria-hidden="true"></div>

        <section class="section guestbook-section" id="guestbook">
          <div class="guestbook-head">
            <h2 class="section__title">방명록</h2>
            <button type="button" class="guestbook-admin-btn" id="guestbook-admin-btn">관리자</button>
          </div>
          <p class="guestbook-section__desc">
            따뜻한 마음이 담긴 축하의 글을 남겨주시면<br />
            소중한 추억으로 간직하겠습니다.
          </p>
          <form class="guestbook-form" id="guestbook-form">
            <div class="guestbook-form__field">
              <div class="guestbook-form__head">
                <label for="guestbook-name">이름</label>
                <span class="guestbook-form__counter" id="guestbook-name-counter">0/10</span>
              </div>
              <input id="guestbook-name" name="name" type="text" maxlength="10" placeholder="이름을 입력하세요" required />
            </div>
            <div class="guestbook-form__field">
              <div class="guestbook-form__head">
                <label for="guestbook-message">내용</label>
                <span class="guestbook-form__counter" id="guestbook-message-counter">0/1000</span>
              </div>
              <textarea
                id="guestbook-message"
                name="message"
                maxlength="1000"
                rows="5"
                placeholder="내용을 입력하세요"
                required
              ></textarea>
            </div>
            <button type="submit" class="guestbook-form__submit">등록하기</button>
          </form>

          <div class="guestbook-list" id="guestbook-list" aria-live="polite"></div>
          <p class="guestbook-empty" id="guestbook-empty">첫 번째 축하 메시지를 남겨주세요.</p>
          <div class="guestbook-pagination" id="guestbook-pagination" hidden>
            <button type="button" class="guestbook-page-btn" id="guestbook-prev" aria-label="이전 페이지">‹</button>
            <div class="guestbook-page-numbers" id="guestbook-page-numbers"></div>
            <button type="button" class="guestbook-page-btn" id="guestbook-next" aria-label="다음 페이지">›</button>
          </div>
        </section>
        <div class="section-divider" aria-hidden="true"></div>

        <section class="section final-note" id="final-note">
          <div class="final-note__photo">
            <img id="final-note-img" src="" alt="" />
          </div>
          <p class="final-note__text" id="final-note-text"></p>
        </section>

        <footer class="footer" id="contact">
          <p class="footer__msg" id="footer-msg"></p>
          <div class="footer__contacts" id="footer-contacts"></div>
        </footer>
      </main>
    </div>

    <div class="modal" id="family-contact-modal" hidden role="dialog" aria-modal="true" aria-labelledby="family-contact-title">
      <div class="modal__backdrop" id="family-contact-backdrop" tabindex="-1"></div>
      <div class="modal__panel">
        <div class="modal__head">
          <h2 class="modal__title" id="family-contact-title">연락처</h2>
          <button type="button" class="modal__close" id="family-contact-close" aria-label="닫기">×</button>
        </div>
        <div class="modal__body" id="family-contact-body"></div>
      </div>
    </div>

    <div class="surprise-modal" id="surprise-modal" hidden aria-modal="true" role="dialog" aria-labelledby="surprise-modal-title">
      <div class="surprise-modal__dim" id="surprise-dim" tabindex="-1"></div>
      <div class="surprise-modal__panel">
        <h2 class="surprise-modal__title" id="surprise-modal-title">추억 한 장</h2>
        <button type="button" class="surprise-modal__close" id="surprise-close" aria-label="닫기">×</button>
        <img class="surprise-modal__img" id="surprise-img" alt="" />
      </div>
    </div>

    <div class="lightbox" id="lightbox" hidden aria-modal="true" role="dialog">
      <div class="lightbox__dim" id="lightbox-dim" tabindex="-1"></div>
      <button type="button" class="lightbox__close" id="lightbox-close" aria-label="닫기">×</button>
      <button type="button" class="lightbox__nav lightbox__nav--prev" id="lightbox-prev" aria-label="이전">‹</button>
      <div class="lightbox__post">
        <div class="lightbox__ig-head">
          <img class="lightbox__ig-avatar" id="lightbox-ig-avatar" src="" alt="" width="36" height="36" />
          <span class="lightbox__ig-user" id="lightbox-ig-user"></span>
        </div>
        <div class="lightbox__photo-wrap">
          <img class="lightbox__img" id="lightbox-img" alt="" />
        </div>
        <div class="lightbox__ig-toolbar" aria-hidden="true">
          <span class="ig-icon ig-icon--heart" title="좋아요"></span>
          <span class="ig-icon ig-icon--comment"></span>
          <span class="ig-icon ig-icon--share"></span>
          <span class="ig-icon ig-icon--save"></span>
        </div>
        <p class="lightbox__ig-likes" id="lightbox-ig-likes"></p>
        <p class="lightbox__ig-caption" id="lightbox-ig-caption"></p>
      </div>
      <button type="button" class="lightbox__nav lightbox__nav--next" id="lightbox-next" aria-label="다음">›</button>
      <div class="lightbox__counter" id="lightbox-counter"></div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
